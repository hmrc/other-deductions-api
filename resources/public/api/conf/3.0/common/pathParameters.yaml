components:
  parameters:
    nino:
      name: nino
      in: path
      description: |
        National Insurance number, in the format `AA999999A`
      schema:
        type: string
        example: TC663795B
      required: true
    taxYear:
      name: taxYear
      in: path
      description: |
        The tax year the data applies to, for example, 2021-22.  The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid. (The minimum tax year in Sandbox is 2019-20)
      schema:
        type: string
        pattern: ^[0-9]{4}-[0-9]{2}$
        example: 2021-22
      required: true
    taxYear2027:
      name: taxYear
      in: path
      description: |
        The tax year the data applies to, for example, 2026-27.  The start year and end year must not span two tax years. The minimum tax year is 2026-27. No gaps are allowed; for example, 2026-28 is not valid.
      schema:
        type: string
        pattern: ^[0-9]{4}-[0-9]{2}$
        example: 2026-27
      required: true
    partnershipUTR:
      name: partnershipUtr
      in: path
      description: |
        The partnership UTR, exactly 10 digits.
      schema:
        type: number
        pattern: '^\d{10}$'
        example: 4564564564
      required: true